name: flutteradgents
description: Flutteradgents is a tool for testers and QA teams that, directly within the project, lets them log into Jira, capture and annotate screenshots, and quickly create and assign bug tickets with all the necessary technical details included.
version: 0.1.3
repository: https://github.com/babakoto/flutteradgents
documentation: https://github.com/babakoto/flutteradgents/blob/main/README.md
issue_tracker: https://github.com/babakoto/flutteradgents/issues

topics:
  - flutter
  - jira
  - qa
  - feedback
  - testing

screenshots:
  - description: FlutterAdgents logo and package overview
    path: assets/logo.png

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutteradgents_feedback: ^3.2.0+flutteradgents.2
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  http_parser: ^4.1.2
  url_launcher: ^6.3.2
  flutter_web_auth_2: ^5.0.1
  app_links: ^7.0.0
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
